[pytest]
addopts = --headed --junitxml=reports/report.xml
markers =
    e2e: End-to-end tests

# ReportPortal Configuration (Replace with your actual instance details)
rp_api_key = your-api-key-here
rp_endpoint = http://localhost:8080
rp_project = ebay_test_project
rp_launch = eBay_E2E_Test_Suite
rp_launch_attributes = 'Pytest' 'Playwright' 'E2E'
rp_launch_description = 'eBay UI Tests execution'
